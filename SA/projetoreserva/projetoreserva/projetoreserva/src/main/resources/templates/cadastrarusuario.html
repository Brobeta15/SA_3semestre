<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Cadastro</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>

<div class="container mt-3">

    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Cadastra-se</h6>
        </div>

        <div class="card-body">
            <form th:action="@{/cadastrarusuario}" method="POST" th:object="${UsuarioDto}">

                <div class="mb-3">
                    <label for="nome" class="form-label">Nome</label>
                    <input type="text" th:field="*{nome}" class="form-control" id="nome" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" id="email"
                           placeholder="seuemail@email.com" required>
                </div>

                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" minlength="5"
                           pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d.@!:\?]{5,}$"
                           title="A senha deve ter no mínimo 5 caracteres, com números e letras!"
                           th:field="*{senha}" class="form-control" id="senha" required>
                </div>

                <div class="mb-3">
                    <label for="matricula" class="form-label">Matrícula</label>
                    <input type="text" th:field="*{matricula}" class="form-control" id="matricula" required>
                </div>

                <div class="mb-3">
                    <label for="dataDeNascimento" class="form-label">Data de Nascimento</label>
                    <input type="date" th:field="*{dataDeNascimento}" class="form-control" id="dataDeNascimento" required>
                </div>

                <div class="row">
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{~/login}" class="btn btn-secondary">Fechar</a>
                    </div>
                </div>

            </form>
