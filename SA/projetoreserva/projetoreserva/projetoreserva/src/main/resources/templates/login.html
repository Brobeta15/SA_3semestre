<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Define codificação UTF-8 e viewport responsivo para adaptação em dispositivos móveis -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Adicionar o Bootstrap na página-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
          crossorigin="anonymous">

    <!-- adiciona icones do bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/materialdesignicons.min.css}">
    <link rel="stylesheet" th:href="@{/css/vendor.bundle.base.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="shortcut icon" th:href="@{/img/favicon.png}">

    <!-- Define o título da página na barra superior do navegador -->
    <title>Login</title>

</head>

<body>

<!-- Container principal -->
<div class="container-scroller">
    <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="content-wrapper d-flex align-items-stretch auth auth-img-bg">
            <div class="row flex-grow">
                <div class="col-lg-6 d-flex align-items-center justify-content-center">
                    <div class="auth-form-transparent text-left p-3">

                        <h4>Bem-Vindo de volta</h4>
                        <h6 class="font-weight-light">Vamos começar?</h6>

                        <form class="pt-3" method="post" th:action="@{login}"  th:object="${LoginDto}">

                            <div class="form-group">
                                <label for="exampleInputEmail">Email</label>
                                <div class="input-group">
                                    <div class="input-group-prepend bg-transparent">

                                    </div>
                                    <input type="email" class="form-control form-control-lg border-left-0" id="exampleInputEmail" th:field="*{email}"
                                           name="user_login" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="exampleInputPassword">Senha</label>
                                <div class="input-group">
                                    <div class="input-group-prepend bg-transparent">

                                    </div>
                                    <input type="password" class="form-control form-control-lg border-left-0"
                                           id="exampleInputPassword" th:field="*{senha}" name="user_password" required>
                                </div>
                            </div>

                            <div class="my-3">
                                <button type="submit" class="btn btn-block btn-primary btn-lg font-weight-medium auth-form-btn">LOGIN</button>
                            </div>

                            <div class="text-center mt-4 font-weight-light">
                                Não possue uma conta? <a th:href="@{/cadastrarusuario}" class="text-primary">Cadastra-se</a>
                            </div>
                        </form>

                        <div th:if="${param.erro}" class="alert alert-danger" role="alert">
                            <span class="mensagem">Erro ao realizar login do usuário!</span>
                        </div>

                        <div th:if="${param.logout}" class="alert alert-info" role="alert">
                            <span class="mensagem">Logout realizado com sucesso!</span>
                        </div>


                    </div>
                </div>
                <div class="col-lg-6 login-half-bg d-flex flex-row">
                    <p class="text-white font-weight-medium text-center flex-grow align-self-end">Copyright &copy; 2025  Todos os direitos reservados.</p>
                </div>
            </div>
        </div>
        <!-- content-wrapper ends -->
    </div>
    <!-- page-body-wrapper ends -->
</div>
<!-- container-scroller -->
<!-- base:js -->
<script th:src="@{/js/vendor.bundle.base.js}"></script>
<script th:src="@{/js/template.js}"></script>
<!-- endinject -->
<!-- plugin js for this page -->
<!-- End plugin js for this page -->
<!-- Custom js for this page-->
<!-- End custom js for this page-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YUe2LzesAfftltw+PEaao2tjU/QATaW/rOitAq67e0CT0Zi2VVRL0oC4+gAaeBKu" crossorigin="anonymous"></script>
</body>

</html>
