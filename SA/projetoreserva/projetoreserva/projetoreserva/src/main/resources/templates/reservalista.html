<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Lista de Reservas</title>

    <!-- Adicione os links para os arquivos CSS do Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="shortcut icon" th:href="@{/img/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>

<div th:insert="navbar :: navigation" class="nav-wrapper"></div>

<div class="container mt-3">

    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Reservas</h6>
        </div>
        <div class="card-body">

            <p class="card-text">
                <a th:href="@{~/reservacadastro}" class="btn btn-primary">Cadastrar Reserva</a>
            </p>

            <div class="table-responsive">
                <table class="table" id="dataTable" width="100%" cellspacing="0">
                    <thead>
                    <tr>
                        <th>id</th>
                        <th>Colaborador</th>
                        <th>Equipamento</th>
                        <th>Data</th>
                        <th>Hora Inicial</th>
                        <th>Hora Final</th>
                        <th>Cancelamento</th>
                        <th>Observação</th>
                        <th style="white-space: nowrap;">Cancelar</th>
                        <th style="white-space: nowrap;">Visualizar</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="lista : ${listaDto}">
                        <td th:text="${lista.id}"></td>
                        <td th:text="${lista.colaborador}"></td>
                        <td th:text="${lista.equipamento}"></td>
                        <td th:text="${lista.data}"></td>
                        <td th:text="${lista.horaInicial}"></td>
                        <td th:text="${lista.horaFinal}"></td>
                        <td th:text="${lista.cancelamento}"></td>
                        <td th:text="${lista.observacao}"></td>
                        <td><a th:href="@{'/reservacancelamento/' + ${lista.id}}" class="btn btn-danger btn-rounded btn-fw" >Cancelar</a></td>
                        <td><a th:href="@{'/reservavisualizar/' + ${lista.id}}" class="btn btn-warning btn-rounded btn-fw">Visualizar</a></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<!-- Fim conteúdo principal -->

<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>

<!-- Rodapé -->
<footer class="text-center py-3">
    <div class="container">
        <span class="text-muted">© Turma 2024/2 - 2025/1 | SENAI Desenvolvimento de Sistemas</span>
    </div>
</footer>

</body>
</html>
